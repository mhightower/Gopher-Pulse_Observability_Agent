version: "2"
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - misspell
    - staticcheck
    - unused
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mhightower/gopher-pulse
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
