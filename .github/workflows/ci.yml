name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run tests with coverage
        # Exclude cmd/pulse-agent (main entrypoint) and internal/telemetry (OTel
        # wiring) from the coverage gate — both are integration-level packages
        # with no unit-testable business logic.
        run: |
          go test -coverprofile=coverage.out \
            $(go list ./... | grep -v 'cmd/pulse-agent' | grep -v 'internal/telemetry')

      - name: Check coverage threshold (+80%)
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v total="$TOTAL" 'BEGIN {
            if (total + 0 < 80) {
              print "Coverage " total "% is below required 80%"
              exit 1
            }
            print "Coverage " total "% meets required +80%"
          }'
