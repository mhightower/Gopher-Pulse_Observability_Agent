services:
  pulse-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gopher-pulse-agent
    environment:
      PULSE_REPO: golang/go
      PULSE_INTERVAL: 15s
      PULSE_ADDR: ":9464"
    ports:
      - "9464:9464"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: gopher-pulse-prometheus-full
    volumes:
      - ./deployments/prometheus/prometheus.full.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"
    depends_on:
      - pulse-agent
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: gopher-pulse-grafana-full
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data-full:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data-full:
